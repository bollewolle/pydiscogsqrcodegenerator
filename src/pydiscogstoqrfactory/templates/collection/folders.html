{% extends "base.html" %}

{% block title %}Collection Folders{% endblock %}

{% block content %}
<h1>Collection Folders</h1>
<p><a href="{{ url_for('collection.landing') }}">&larr; Back to Home</a></p>

<div class="folders-grid">
    {% for folder in folders %}
        <a href="{{ url_for('collection.folder_releases', folder_id=folder.id) }}" class="folder-card">
            <h3>{{ folder.name }}</h3>
            <span class="badge">{{ folder.count }} releases</span>
        </a>
    {% endfor %}
</div>
{% endblock %}
